<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --admin-primary: #1e3a8a; /* Deep Royal Blue */
            --admin-secondary: #3b82f6;
            --accent-gold: #fbbf24;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* ========== Modern Navbar ========== */
        .navbar {
            background: linear-gradient(135deg, var(--admin-primary) 0%, #1e40af 100%);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: 0.5px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .logout-btn:hover { background: var(--danger); border-color: var(--danger); }

        /* ========== Layout Container ========== */
        .container {
            max-width: 1400px;
            margin: 2.5rem auto;
            padding: 0 20px;
        }

        /* ========== Stats Grid ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--white);
            padding: 1.8rem;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            transition: 0.3s ease;
            border-left: 6px solid var(--admin-primary);
        }

        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.08); }

        .stat-icon {
            font-size: 2.2rem;
            background: #eff6ff;
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            color: var(--admin-primary);
        }

        .stat-content h4 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--admin-primary); margin-top: 2px; }

        /* ========== Table Section ========== */
        .admin-section {
            background: var(--white);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.03);
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .section-title { font-size: 1.4rem; font-weight: 700; color: var(--text-dark); }

        /* ========== Premium Table ========== */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
            border: 1px solid #edf2f7;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            padding: 16px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 18px 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }

        tr:hover { background-color: #f9fafb; }

        /* ========== Buttons & Badges ========== */
        .btn {
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-add { background: var(--admin-primary); color: white; box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2); }
        .btn-add:hover { background: #1e40af; transform: translateY(-2px); }

        .btn-edit { background: #f1f5f9; color: var(--admin-primary); margin-right: 5px; }
        .btn-delete { background: #fff1f2; color: var(--danger); }
        .btn-edit:hover { background: var(--admin-primary); color: white; }
        .btn-delete:hover { background: var(--danger); color: white; }

        .badge {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-student { background: #ecfdf5; color: #059669; }
        .badge-doctor { background: #eff6ff; color: #2563eb; }
        .badge-advisor { background: #fef3c7; color: #d97706; }

        /* ========== Modal ========== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(5px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            width: 95%;
            max-width: 500px;
            padding: 2.5rem;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.85rem; color: var(--text-dark); }
        
        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus { border-color: var(--admin-secondary); }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <span>🛡️</span> UNIVERSITY ADMIN
        </div>
        <div class="user-info">
            <span id="userName" style="font-weight: 600;">System Administrator</span>
            <button class="logout-btn" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🎓</div>
                <div class="stat-content">
                    <h4>Total Students</h4>
                    <div class="stat-number" id="studentsCount">1,240</div>
                </div>
            </div>
            <div class="stat-card" style="border-left-color: var(--success);">
                <div class="stat-icon" style="color: var(--success);">👨‍🏫</div>
                <div class="stat-content">
                    <h4>Professors</h4>
                    <div class="stat-number" id="doctorsCount">84</div>
                </div>
            </div>
            <div class="stat-card" style="border-left-color: var(--warning);">
                <div class="stat-icon" style="color: var(--warning);">📖</div>
                <div class="stat-content">
                    <h4>Courses</h4>
                    <div class="stat-number" id="coursesCount">42</div>
                </div>
            </div>
            <div class="stat-card" style="border-left-color: var(--accent-gold);">
                <div class="stat-icon" style="color: var(--accent-gold);">⚖️</div>
                <div class="stat-content">
                    <h4>Advisors</h4>
                    <div class="stat-number" id="advisorsCount">12</div>
                </div>
            </div>
        </div>

        <div class="admin-section">
            <div class="section-header">
                <div class="section-title">Manage User Accounts</div>
                <button class="btn btn-add" onclick="openAddUserModal()">+ Add New User</button>
            </div>
            
            <div class="table-wrapper" id="usersTableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>Full Name</th>
                            <th>University ID</th>
                            <th>Role</th>
                            <th>Email Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>John Doe</strong></td>
                            <td><code>2024001</code></td>
                            <td><span class="badge badge-student">Student</span></td>
                            <td style="color: var(--text-muted)">j.doe@university.edu</td>
                            <td>
                                <button class="btn btn-edit">Edit</button>
                                <button class="btn btn-delete">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="section-header">
                <h3 id="modalTitle">Add New Account</h3>
                <span style="cursor:pointer; font-size: 1.5rem;" onclick="closeModal()">&times;</span>
            </div>
            <form id="userForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="e.g. Michael Scott" required>
                </div>
                <div class="form-group">
                    <label>Academic Email</label>
                    <input type="email" placeholder="m.scott@uni.edu" required>
                </div>
                <div class="form-group">
                    <label>University ID</label>
                    <input type="text" required>
                </div>
                <div class="form-group">
                    <label>Account Role</label>
                    <select id="userRole">
                        <option value="student">Student</option>
                        <option value="doctor">Professor (Doctor)</option>
                        <option value="advisor">Academic Advisor</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-add" style="width: 100%; margin-top: 1rem;">
                    Confirm & Save
                </button>
            </form>
        </div>
    </div>

    <script>
        function closeModal() {
            document.getElementById('userModal').style.display = "none";
        }
        function openAddUserModal() {
            document.getElementById('userModal').style.display = "flex";
        }
    </script>
</body>
</html>
