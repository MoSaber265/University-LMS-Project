<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FCIS Portal - Login Only</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* Branding Section */
        .faculty-logo-container {
            text-align: center;
            margin-bottom: 35px;
            color: white;
            animation: fadeInDown 0.8s ease-out;
        }

        .faculty-logo {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 15px;
            font-size: 50px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .portal-title {
            font-size: 2.2rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .portal-subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-top: 5px;
            font-weight: 400;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Role Selection Grid */
        .role-selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
        }

        .role-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .role-card:hover {
            background: white;
            color: #764ba2;
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .role-card i {
            font-size: 45px;
            display: block;
            margin-bottom: 15px;
        }

        /* Login Container */
        .login-container {
            background: white;
            border-radius: 25px;
            padding: 45px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
            display: none;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { text-align: center; color: #2d3436; margin-bottom: 30px; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #636e72; font-weight: 600; font-size: 0.9rem; }
        input { 
            width: 100%; padding: 14px; border: 2px solid #edf2f7; 
            border-radius: 12px; font-size: 16px; box-sizing: border-box; 
            transition: 0.3s;
        }
        input:focus { outline: none; border-color: #667eea; background: #f8fafc; }
        
        button#loginBtn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: 700; cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        .loader {
            width: 20px; height: 20px; border: 3px solid #FFF; border-bottom-color: transparent;
            border-radius: 50%; display: none; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .back-btn {
            background: none; border: none; color: #667eea;
            cursor: pointer; font-weight: bold; margin-bottom: 15px; display: block;
        }
    </style>
</head>
<body>

    <div class="faculty-logo-container" id="mainHeader">
        <div class="faculty-logo">💻</div> 
        <h1 class="portal-title">FCIS Portal</h1>
        <p class="portal-subtitle">Faculty of Computer and Information Sciences</p>
    </div>

    <div class="role-selection-grid" id="roleGrid">
        <div class="role-card" onclick="showLoginForm('student', 'Student Access')">
            <i>👨‍🎓</i><h3>Student Portal</h3>
        </div>
        <div class="role-card" onclick="showLoginForm('doctor', 'Faculty Staff')">
            <i>👨‍🏫</i><h3>Professors</h3>
        </div>
        <div class="role-card" onclick="showLoginForm('advisor', 'Academic Advisor')">
            <i>🎓</i><h3>Advisors</h3>
        </div>
        <div class="role-card" onclick="showLoginForm('admin', 'System Admin')">
            <i>👑</i><h3>Control Panel</h3>
        </div>
    </div>

    <div class="login-container" id="loginBox">
        <button class="back-btn" onclick="goBack()">← Back to Selection</button>
        <h2 id="loginTitle">Login</h2>
        
        <div id="errorMsg" style="display:none; background:#fff5f5; color:#c33; padding:12px; border-radius:10px; margin-bottom:20px; text-align:center; border:1px solid #feb2b2; font-size: 14px;"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>University Email</label>
                <input type="email" id="email" required placeholder="name@fcis.edu" autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="********" autocomplete="current-password">
            </div>
            <button type="submit" id="loginBtn">
                <span id="btnText">Sign In</span>
                <div class="loader" id="btnLoader"></div>
            </button>
        </form>

        </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        let currentRole = '';

        function showLoginForm(role, title) {
            currentRole = role;
            document.getElementById('roleGrid').style.display = 'none';
            document.getElementById('mainHeader').style.display = 'none'; 
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('loginTitle').innerText = title;
            document.getElementById('errorMsg').style.display = 'none';
        }

        function goBack() {
            document.getElementById('roleGrid').style.display = 'grid';
            document.getElementById('mainHeader').style.display = 'block';
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');

            // UI Feedback
            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            btnText.innerText = "Verifying...";
            btnLoader.style.display = "block";

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();

                // 1. Logic Failures (Wrong pass, user not found)
                if (!data.success) {
                    throw new Error(data.message || 'Invalid credentials.');
                }

                // 2. Role Security Check
                if (data.user.role !== currentRole) {
                    throw new Error(`Unauthorized: This account is registered as ${data.user.role}.`);
                }

                // 3. Success - Save & Redirect
                localStorage.setItem('user', JSON.stringify(data.user));
                // Optional: Save token if you implement it later
                if(data.token) localStorage.setItem('token', data.token); 
                
                btnText.innerText = "Access Granted...";
                
                setTimeout(() => {
                    // Redirect to the correct folder
                    window.location.href = `views/${data.user.role}-dashboard.html`;
                }, 800);

            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                btnText.innerText = "Sign In";
                btnLoader.style.display = "none";
            }
        });
    </script>
</body>
</html>
